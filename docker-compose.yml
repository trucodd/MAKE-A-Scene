version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MURF_API_KEY=${MURF_API_KEY}
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
      - script-mixer

  script-mixer:
    build:
      context: ./script-mixer
    ports:
      - "8001:8001"
    environment:
      - GEMINI_KEY=${GEMINI_KEY}
      - FREESOUND_API_KEY=${FREESOUND_API_KEY}
      - MURF_API_KEY=${MURF_API_KEY}
    volumes:
      - ./script-mixer:/app
      - ./backend:/app/backend
      - ./.env:/app/.env
      - mixer-sounds:/app/sounds
      - mixer-scenes:/app/mixed_scenes
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  mixer-sounds:
  mixer-scenes: